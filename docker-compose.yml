version: '3.8'

services:
  pipeline:
    build: .
    container_name: bi-pipeline
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - DATA_PATH=/app/data/
      - ENVIRONMENT=production
    command: python -c "from src.pipeline import BIPipeline; BIPipeline().run_complete_pipeline()"
  
  dashboard:
    build: .
    container_name: bi-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    environment:
      - DATA_PATH=/app/data/
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    command: streamlit run src/dashboard.py --server.port=8501 --server.address=0.0.0.0
    depends_on:
      - pipeline
